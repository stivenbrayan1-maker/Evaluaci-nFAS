<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeuroSync Pro - Evaluación</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --main: #00d2ff; /* Cian Brillante */
            --brain-pink: #ff75c3; /* Magenta Neón */
            --dark: #05050a; /* Fondo casi negro */
            --card-bg: rgba(20, 20, 35, 0.8);
            --glass: rgba(255, 255, 255, 0.03);
            --success: #10b981; /* Verde */
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--dark);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.1) 0%, transparent 80%);
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            width: 90%;
            max-width: 550px;
            padding: 40px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.08);
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            position: relative;
        }

        /* Logotipo Cerebro Anatómico Detallado (Neón) */
        .brain-logo {
            margin-bottom: 25px;
            position: relative;
            filter: drop-shadow(0 0 15px rgba(255, 117, 195, 0.6));
            animation: neural-pulse 4s infinite ease-in-out;
        }

        @keyframes neural-pulse {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.03); opacity: 1; filter: drop-shadow(0 0 25px rgba(0, 210, 255, 0.7)); }
        }

        h1 {
            font-weight: 900;
            font-size: 2.2rem;
            letter-spacing: -1px;
            margin: 0;
            background: linear-gradient(135deg, var(--main), var(--brain-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
            margin-bottom: 30px;
        }

        .timer {
            font-size: 7rem;
            font-weight: 900;
            margin: 20px 0;
            font-variant-numeric: tabular-nums;
            color: var(--main);
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
            transition: color 0.3s;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        /* Campo de texto para ID del paciente */
        .patient-id-input {
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #333;
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 1rem;
            text-align: center;
        }
        .patient-id-input:focus {
            border-color: var(--main);
            outline: none;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
        }

        select, button {
            padding: 18px;
            border-radius: 18px;
            border: none;
            font-size: 1.1rem;
            font-weight: 700;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        select {
            background: #111420;
            color: white;
            border: 1px solid #333;
            appearance: none;
            text-align-last: center;
        }
        select:focus { border-color: var(--brain-pink); outline: none; }

        .btn-mic {
            background: #2a2d3e;
            color: white;
            border: 1px dashed rgba(255,255,255,0.2);
        }
        .btn-mic:hover { background: #35394f; }
        .btn-mic.ready {
            background: var(--success);
            border-color: transparent;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        .btn-start {
            background: linear-gradient(135deg, var(--primary, #4f46e5), var(--secondary, #9333ea));
            background: linear-gradient(135deg, var(--main), var(--brain-pink));
            color: white;
            opacity: 0.3;
            cursor: not-allowed;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
        }
        .btn-start.active {
            opacity: 1;
            cursor: pointer;
        }
        .btn-start.active:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(99, 102, 241, 0.5);
        }

        .word-cloud {
            min-height: 140px;
            margin-top: 25px;
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            border: 1px dashed rgba(255,255,255,0.08);
            position: relative;
        }

        .cloud-label {
            position: absolute;
            top: -10px;
            left: 20px;
            background: var(--card-bg);
            padding: 0 10px;
            font-size: 0.75rem;
            color: #64748b;
        }

        .tag {
            background: rgba(0, 210, 255, 0.1);
            color: var(--main);
            padding: 6px 16px;
            border-radius: 25px;
            border: 1px solid rgba(0, 210, 255, 0.3);
            font-size: 0.9rem;
            font-weight: 500;
            animation: tag-appear 0.4s ease-out;
        }

        @keyframes tag-appear {
            0% { transform: scale(0.5) translateY(10px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.92);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            backdrop-filter: blur(10px);
            animation: fade-in 0.5s ease;
        }

        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

        .spinner {
            border: 4px solid rgba(255,255,255,0.1);
            border-left-color: var(--brain-pink);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

<div id="overlay">
    <div class="spinner"></div>
    <h2 id="status-msg" style="font-weight:800; color:white; margin-bottom:10px;">Sincronizando con Base de Datos</h2>
    <p style="color: #94a3b8; font-size: 0.9rem;">Por favor, mantén esta ventana abierta.</p>
</div>

<div class="card">
    <div class="brain-logo">
        <svg width="130" height="110" viewBox="0 0 220 180">
            <path fill="rgba(255, 117, 195, 0.15)" d="M110,165 C45,165 15,135 15,90 C15,45 45,15 110,15 C175,15 205,45 205,90 C205,135 175,165 110,165 Z" filter="blur(8px)"/>
            
            <path fill="none" stroke="#ff75c3" stroke-width="3" stroke-linecap="round" d="M110,25 C120,25 145,30 155,50 C165,70 160,100 145,110 C130,120 110,110 110,110"/>
            <path fill="none" stroke="#ff75c3" stroke-width="3" stroke-linecap="round" d="M110,25 C100,25 75,30 65,50 C55,70 60,100 75,110 C90,120 110,110 110,110"/>
            
            <path fill="none" stroke="#ff75c3" stroke-width="3" stroke-linecap="round" d="M110,110 L110,155 M85,110 C55,120 45,140 55,160 M135,110 C165,120 175,140 165,160"/>
            
            <path fill="none" stroke="#00d2ff" stroke-width="1.5" stroke-opacity="0.6" d="M135,50 C125,55 125,65 135,70 M85,50 C95,55 95,65 85,70 M110,40 L110,75"/>
            <circle fill="#00d2ff" cx="135" cy="50" r="3" filter="drop-shadow(0 0 5px #00d2ff)"/>
            <circle fill="#ff75c3" cx="85" cy="50" r="3" filter="drop-shadow(0 0 5px #ff75c3)"/>
        </svg>
    </div>

    <h1>NeuroSync Pro</h1>
    <div class="subtitle">Sistema de Monitoreo Neuropsicológico</div>

    <input type="text" id="patientId" class="patient-id-input" placeholder="ID o Iniciales del Paciente (Opcional)">

    <div class="controls">
        <select id="testType">
            <optgroup label="Fonológica (Letras) - Control Ejecutivo">
                <option value="Letra F">Fluidez: Letra F</option>
                <option value="Letra A">Fluidez: Letra A</option>
                <option value="Letra S">Fluidez: Letra S</option>
            </optgroup>
            <optgroup label="Semántica (Categorías) - Memoria">
                <option value="Animales">Categoría: Animales</option>
                <option value="Frutas">Categoría: Frutas</option>
                <option value="Profesiones">Categoría: Profesiones</option>
            </optgroup>
        </select>
        <button id="btnMic" class="btn-mic" onclick="initVoiceSystem()">1. CALIBRAR SENSOR DE VOZ</button>
        <button id="btnStart" class="btn-start" onclick="startEvaluation()" disabled>2. INICIAR SCAN (60s)</button>
    </div>

    <div id="timer" class="timer">60</div>

    <div class="word-cloud">
        <div class="cloud-label">Red Léxica Detectada</div>
        <div id="word-list-content" style="display:flex; flex-wrap:wrap; gap:12px; justify-content:center; width:100%;">
            <span style="color: #475569; font-style: italic;">Esperando activación del sensor...</span>
        </div>
    </div>
</div>

<script>
    let recognition;
    let timerInterval;
    let timeLeft = 60;
    let wordsSet = new Set();
    
    // !!! PEGA AQUÍ TU ID DE FORMSPREE QUE ENCONTRAMOS (mbdzwqbg) !!!
    const FORMSPREE_ID = "TU_ID_DE_FORMSPREE"; 

    // Inicializar el sistema de voz (Crucial para móviles)
    function initVoiceSystem() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            alert("Tu navegador no soporta reconocimiento de voz nativo. Por favor, usa Chrome (Android) o Safari (iPhone).");
            return;
        }

        recognition = new SpeechRecognition();
        recognition.lang = 'es-EC'; // Configurado para acento ecuatoriano
        recognition.continuous = true;
        recognition.interimResults = false;

        recognition.onresult = (event) => {
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    let transcript = event.results[i][0].transcript.toLowerCase().trim();
                    // Separar por si dijo varias palabras juntas
                    transcript.split(/\s+/).forEach(word => {
                        if (word.length > 1 && !wordsSet.has(word)) {
                            wordsSet.add(word);
                            renderWordTags();
                        }
                    });
                }
            }
        };

        // Solicitar permiso explícito del micrófono (Soluciona bloqueos en móvil)
        navigator.mediaDevices.getUserMedia({ audio: true })
            .then(() => {
                document.getElementById('btnMic').innerText = "✓ SENSOR DE VOZ LISTO";
                document.getElementById('btnMic').classList.add('ready');
                const startBtn = document.getElementById('btnStart');
                startBtn.disabled = false;
                startBtn.classList.add('active');
            })
            .catch(err => {
                alert("Error: Debes permitir el acceso al micrófono para realizar la evaluación.");
                console.error(err);
            });
    }

    function startEvaluation() {
        wordsSet.clear();
        renderWordTags();
        timeLeft = 60;
        document.getElementById('timer').textContent = timeLeft;
        document.getElementById('timer').style.color = "var(--success)";
        document.getElementById('btnStart').disabled = true;
        document.getElementById('patientId').disabled = true;
        document.getElementById('testType').disabled = true;

        recognition.start();

        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').textContent = timeLeft;
            
            if (timeLeft <= 10) {
                document.getElementById('timer').style.color = "#f43f5e"; // Rojo al final
            }

            if (timeLeft <= 0) {
                endEvaluation();
            }
        }, 1000);
    }

    function renderWordTags() {
        const container = document.getElementById('word-list-content');
        if (wordsSet.size === 0) {
            container.innerHTML = '<span style="color: #475569; font-style: italic;">Escuchando... Di palabras.</span>';
            return;
        }
        container.innerHTML = Array.from(wordsSet).map(w => `<span class="tag">${w}</span>`).join('');
    }

    function endEvaluation() {
        clearInterval(timerInterval);
        recognition.stop();
        document.getElementById('timer').style.color = "var(--accent)";
        sendDataToDatabase();
    }

    // Función que envía los datos automáticamente a tu correo (Tipo Google Forms)
    async function sendDataToDatabase() {
        // Mostrar pantalla de carga
        document.getElementById('overlay').style.display = 'flex';
        
        const patientName = document.getElementById('patientId').value || "Anónimo";
        const testCategory = document.getElementById('testType').value;
        const wordsList = Array.from(wordsSet).join(", ");

        // Estructura de datos para Formspree
        const evaluationData = {
            paciente_id: patientName,
            tipo_prueba: testCategory,
            total_palabras: wordsSet.size,
            lista_palabras: wordsList,
            fecha_evaluacion: new Date().toLocaleString()
        };

        if (FORMSPREE_ID === "TU_ID_DE_FORMSPREE") {
             document.getElementById('status-msg').innerText = "❌ ERROR: No configuraste tu ID de Formspree.";
             document.getElementById('status-msg').style.color = "#f43f5e";
             return;
        }

        try {
            // Envío por "debajo" (AJAX) directo a tu Formspree
            const response = await fetch(`https://formspree.io/f/${FORMSPREE_ID}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(evaluationData)
            });

            if (response.ok) {
                document.getElementById('status-msg').innerText = "✓ DATOS SINCRONIZADOS CORRECTAMENTE";
                document.getElementById('status-msg').style.color = "var(--success)";
                // Reiniciar automáticamente después de 3 segundos
                setTimeout(() => {
                    location.reload();
                }, 3000);
            } else {
                throw new Error("Fallo en el servidor");
            }
        } catch (error) {
            document.getElementById('status-msg').innerText = "❌ ERROR AL ENVIAR. Revisa tu ID de Formspree o conexión.";
            document.getElementById('status-msg').style.color = "#f43f5e";
            console.error("Error en el envío:", error);
        }
    }
</script>

</body>
</html>
