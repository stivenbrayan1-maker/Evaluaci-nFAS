<script>
    let recognition;
    let timer;
    let timeLeft = 60;
    let words = new Set();
    const targetEmail = "stiven.brayan1@gmail.com";

    // COMPATIBILIDAD MÓVIL: Forzar prefijos
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'es-EC';
        recognition.continuous = true;
        recognition.interimResults = false;
        // En móviles es mejor usar gramática limitada o procesar rápido
        recognition.maxAlternatives = 1;

        recognition.onresult = (event) => {
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    const text = event.results[i][0].transcript.toLowerCase().trim();
                    const wordsFound = text.split(/\s+/);
                    wordsFound.forEach(w => {
                        if (w.length > 1 && !words.has(w)) {
                            words.add(w);
                            renderWords();
                        }
                    });
                }
            }
        };
        
        // Reiniciar si se corta (común en móviles por ruido de fondo)
        recognition.onend = () => {
            if (timeLeft > 0 && timeLeft < 60) {
                try { recognition.start(); } catch(e) {}
            }
        };
    }

    async function activateMic() {
        // PASO CRÍTICO PARA MÓVILES: Solicitar permiso mediante la API de MediaDevices primero
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            // Si llegamos aquí, el usuario aceptó el permiso en el móvil
            document.getElementById('mic-btn').textContent = "✓ Micro Autorizado";
            document.getElementById('mic-btn').classList.add('ready');
            document.getElementById('start-btn').disabled = false;
            document.getElementById('start-btn').classList.add('active');
            
            // Liberamos el stream temporal para que SpeechRecognition pueda usarlo
            stream.getTracks().forEach(track => track.stop());
        } catch (err) {
            alert("Error: En el móvil debes ir a Configuración > Privacidad > Micrófono y permitir a tu navegador.");
            console.error(err);
        }
    }

    function startTest() {
        if (!recognition) {
            alert("Tu navegador móvil no soporta esta tecnología. Prueba con Chrome actualizado.");
            return;
        }
        words.clear();
        renderWords();
        timeLeft = 60;
        document.getElementById('start-btn').disabled = true;
        
        // En móviles, iniciamos el reconocimiento justo después del clic
        try {
            recognition.start();
        } catch(e) {
            console.log("Ya iniciado");
        }
        
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').textContent = timeLeft;
            if (timeLeft <= 0) endTest();
        }, 1000);
    }

    // El resto de funciones (renderWords, endTest, downloadExcel, sendEmail) se mantienen igual
</script>
