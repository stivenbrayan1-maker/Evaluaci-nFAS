<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroSystem Pro - Evaluación</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --main: #00d2ff; --brain-pink: #ff75c3; --dark: #0a0e17; --glass: rgba(255, 255, 255, 0.05); }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: white; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .card { background: var(--glass); backdrop-filter: blur(10px); width: 90%; max-width: 500px; padding: 40px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        
        /* Cerebro Anatómico Realista */
        .brain-container { margin-bottom: 20px; filter: drop-shadow(0 0 15px var(--brain-pink)); animation: heartBeat 2s infinite; }
        @keyframes heartBeat { 0% {transform: scale(1);} 50% {transform: scale(1.05);} 100% {transform: scale(1);} }

        h1 { font-weight: 900; letter-spacing: -1px; margin: 0; background: linear-gradient(to right, var(--main), var(--brain-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .timer { font-size: 6rem; font-weight: 900; margin: 20px 0; font-variant-numeric: tabular-nums; color: var(--main); }
        
        .controls { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        select, button { padding: 18px; border-radius: 18px; border: none; font-size: 1rem; font-weight: 700; transition: 0.3s; }
        select { background: #161b26; color: white; border: 1px solid #333; }
        
        .btn-primary { background: white; color: black; cursor: pointer; }
        .btn-start { background: linear-gradient(135deg, var(--main), var(--brain-pink)); color: white; cursor: not-allowed; opacity: 0.3; }
        .btn-active { opacity: 1; cursor: pointer; }

        .word-cloud { min-height: 120px; margin-top: 20px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .tag { background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 30px; border: 1px solid var(--main); font-size: 0.9rem; animation: appear 0.3s ease; }
        @keyframes appear { from {opacity:0; transform: translateY(10px);} to {opacity:1; transform: translateY(0);} }

        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

<div id="overlay">
    <h2 id="status-msg">Enviando a la base de datos...</h2>
    <p>Por favor, no cierres la ventana.</p>
</div>

<div class="card">
    <div class="brain-container">
        <svg width="120" height="100" viewBox="0 0 200 160">
            <path fill="#ff75c3" d="M100,150 C40,150 10,120 10,80 C10,40 40,10 100,10 C160,10 190,40 190,80 C190,120 160,150 100,150 Z" opacity="0.2"/>
            <path fill="none" stroke="#ff75c3" stroke-width="3" d="M100,20 C110,20 130,25 140,40 C150,55 145,80 130,90 C115,100 100,90 100,90 C100,90 85,100 70,90 C55,80 50,55 60,40 C70,25 90,20 100,20 Z"/>
            <path fill="none" stroke="#ff75c3" stroke-width="2" d="M100,90 L100,140 M70,90 C40,100 30,120 40,140 M130,90 C160,100 170,120 160,140 M80,40 C70,45 70,55 80,60 M120,40 C130,45 130,55 120,60"/>
        </svg>
    </div>
    <h1>NEURO-TRACKER</h1>
    <p style="color: #666; font-size: 0.8rem; margin-top: 5px;">Sistema de Monitoreo de Fluidez Verbal</p>

    <div class="controls">
        <select id="testType">
            <option value="Letra F">Fluidez: Letra F</option>
            <option value="Animales">Categoría: Animales</option>
            <option value="Frutas">Categoría: Frutas</option>
        </select>
        <button id="btnMic" class="btn-primary" onclick="initAudio()">1. CALIBRAR SENSOR VOZ</button>
        <button id="btnStart" class="btn-start" onclick="runTest()" disabled>2. INICIAR SCAN</button>
    </div>

    <div id="timer" class="timer">60</div>
    <div id="words" class="word-cloud"></div>
</div>

<script>
    let rec;
    let sec = 60;
    let list = new Set();
    // REEMPLAZA ESTO CON TU ID DE FORMSPREE
    const FORMSPREE_ID = "TU_ID_DE_FORMSPREE"; 

    function initAudio() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Speech) return alert("Usa Chrome o Safari actualizado.");
        
        rec = new Speech();
        rec.lang = 'es-EC';
        rec.continuous = true;
        rec.interimResults = false;

        rec.onresult = (e) => {
            for (let i = e.resultIndex; i < e.results.length; ++i) {
                if (e.results[i].isFinal) {
                    let word = e.results[i][0].transcript.toLowerCase().trim();
                    word.split(" ").forEach(w => {
                        if (w.length > 1 && !list.has(w)) {
                            list.add(w);
                            let t = document.createElement('span');
                            t.className = 'tag'; t.innerText = w;
                            document.getElementById('words').appendChild(t);
                        }
                    });
                }
            }
        };

        navigator.mediaDevices.getUserMedia({ audio: true }).then(() => {
            document.getElementById('btnMic').innerText = "✓ SENSOR LISTO";
            document.getElementById('btnStart').disabled = false;
            document.getElementById('btnStart').classList.add('btn-active');
        });
    }

    function runTest() {
        list.clear(); document.getElementById('words').innerHTML = "";
        document.getElementById('btnStart').disabled = true;
        rec.start();
        let itv = setInterval(() => {
            sec--; document.getElementById('timer').innerText = sec;
            if (sec <= 0) { clearInterval(itv); rec.stop(); sendData(); }
        }, 1000);
    }

    async function sendData() {
        document.getElementById('overlay').style.display = 'flex';
        const data = {
            prueba: document.getElementById('testType').value,
            total: list.size,
            palabras: Array.from(list).join(", "),
            fecha: new Date().toLocaleString()
        };

        try {
            const response = await fetch(`https://formspree.io/f/${FORMSPREE_ID}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                document.getElementById('status-msg').innerText = "✓ ¡DATOS GUARDADOS EN TU CUENTA!";
                setTimeout(() => location.reload(), 3000);
            }
        } catch (e) {
            document.getElementById('status-msg').innerText = "Error al enviar. Revisa tu conexión.";
        }
    }
</script>
</body>
</html>
