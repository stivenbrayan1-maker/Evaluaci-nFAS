<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroFluidez Pro - Assessment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --secondary: #a855f7; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --accent: #22d3ee; --success: #10b981; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .app-container { background: var(--card); width: 100%; max-width: 600px; border-radius: 24px; padding: 30px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .brain-icon { width: 60px; height: 60px; fill: var(--accent); margin-bottom: 10px; }
        h1 { font-size: 1.8rem; margin: 0; background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .setup-section { margin: 20px 0; display: flex; flex-direction: column; gap: 10px; }
        select, button { padding: 12px; border-radius: 12px; border: none; font-size: 1rem; font-weight: 600; cursor: pointer; }
        select { background: #0f172a; color: white; border: 1px solid #334155; }
        .btn-mic { background: #334155; color: white; }
        .btn-mic.ready { background: var(--success); }
        .btn-start { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; opacity: 0.5; }
        .btn-start.active { opacity: 1; }
        #timer { font-size: 5rem; font-weight: 800; margin: 10px 0; color: var(--accent); }
        .word-list { margin-top: 15px; min-height: 80px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 15px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .word-tag { background: rgba(79, 70, 229, 0.2); border: 1px solid var(--primary); padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; }
        .results-area { display: none; margin-top: 20px; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 15px; }
    </style>
</head>
<body>

<div class="app-container">
    <svg class="brain-icon" viewBox="0 0 24 24"><path d="M12,3C7.58,3 4,4.79 4,7C4,9.21 7.58,11 12,11C16.42,11 20,9.21 20,7C20,4.79 16.42,3 12,3M4,9V12C4,14.21 7.58,16 12,16C16.42,16 20,14.21 20,12V9C18.16,10.22 15.2,11 12,11C8.8,11 5.84,10.22 4,9M4,14V17C4,19.21 7.58,21 12,21C16.42,21 20,19.21 20,17V14C18.16,15.22 15.2,16 12,16C8.8,16 5.84,15.22 4,14Z" /></svg>
    <h1>NeuroFluidez Pro</h1>
    
    <div class="setup-section">
        <select id="test-type">
            <option value="Letra F">Fluidez: Letra F</option>
            <option value="Letra A">Fluidez: Letra A</option>
            <option value="Letra S">Fluidez: Letra S</option>
            <option value="Animales">Categoría: Animales</option>
            <option value="Frutas">Categoría: Frutas</option>
            <option value="Profesiones">Categoría: Profesiones</option>
        </select>
        <button id="mic-btn" class="btn-mic" onclick="activateMic()">1. Activar Micrófono</button>
        <button id="start-btn" class="btn-start" onclick="startTest()" disabled>2. Iniciar Evaluación</button>
    </div>

    <div id="timer">60</div>
    <div class="word-list" id="word-list"></div>

    <div class="results-area" id="results">
        <h3>Resultados Finales</h3>
        <p>Palabras únicas: <span id="total-count" style="color:var(--accent); font-size:1.5rem;">0</span></p>
        <button onclick="sendEmail()" style="background:var(--primary); color:white; width:100%; margin-bottom:10px;">Enviar a mi Correo</button>
        <button onclick="location.reload()" style="background:#475569; color:white; width:100%;">Reiniciar</button>
    </div>
</div>

<script>
    let recognition;
    let timer;
    let timeLeft = 60;
    let words = new Set();
    const myEmail = "stiven.brayan1@gmail.com";

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'es-EC';
        recognition.continuous = true;
        recognition.onresult = (event) => {
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    const text = event.results[i][0].transcript.toLowerCase().trim();
                    text.split(/\s+/).forEach(w => {
                        if (w.length > 1 && !words.has(w)) {
                            words.add(w);
                            renderWords();
                        }
                    });
                }
            }
        };
    }

    async function activateMic() {
        try {
            await navigator.mediaDevices.getUserMedia({ audio: true });
            document.getElementById('mic-btn').textContent = "✓ Micro Listo";
            document.getElementById('mic-btn').classList.add('ready');
            document.getElementById('start-btn').disabled = false;
            document.getElementById('start-btn').classList.add('active');
        } catch (e) { alert("Debes permitir el micro en el navegador."); }
    }

    function startTest() {
        words.clear(); renderWords();
        document.getElementById('start-btn').disabled = true;
        recognition.start();
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').textContent = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timer);
                recognition.stop();
                document.getElementById('results').style.display = 'block';
                document.getElementById('total-count').textContent = words.size;
            }
        }, 1000);
    }

    function renderWords() {
        document.getElementById('word-list').innerHTML = Array.from(words).map(w => `<span class="word-tag">${w}</span>`).join('');
    }

    function sendEmail() {
        const type = document.getElementById('test-type').value;
        const body = `Prueba: ${type}\nTotal: ${words.size}\nLista: ${Array.from(words).join(', ')}`;
        window.location.href = `mailto:${myEmail}?subject=Resultado Neuro&body=${encodeURIComponent(body)}`;
    }
</script>
</body>
</html>
