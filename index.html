<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NeuroScan - Fluidez Verbal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --purple: #7000ff; --bg: #05050a; --text: #e0e0e0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .container { background: rgba(20, 20, 35, 0.9); width: 90%; max-width: 500px; padding: 30px; border-radius: 30px; border: 1px solid var(--purple); box-shadow: 0 0 30px rgba(112, 0, 255, 0.3); text-align: center; }
        
        /* Cerebro Neón Animado */
        .brain-box { margin-bottom: 20px; }
        .brain-svg { width: 100px; fill: var(--neon); filter: drop-shadow(0 0 10px var(--neon)); animation: pulse 2s infinite ease-in-out; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }

        h1 { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; color: var(--neon); letter-spacing: 2px; }
        .timer { font-family: 'Orbitron', sans-serif; font-size: 5rem; font-weight: 700; color: #fff; text-shadow: 0 0 20px var(--neon); margin: 20px 0; }
        
        select, button { width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: 600; margin: 10px 0; font-family: 'Inter'; }
        select { background: #1a1a2e; color: white; border: 1px solid var(--purple); }
        .btn-mic { background: #2a2a40; color: white; border: 1px dashed var(--neon); }
        .btn-start { background: linear-gradient(90deg, var(--purple), #b000ff); color: white; cursor: not-allowed; opacity: 0.5; }
        .btn-active { opacity: 1; cursor: pointer; box-shadow: 0 0 15px var(--purple); }

        .words-container { background: rgba(0,0,0,0.3); min-height: 100px; border-radius: 15px; padding: 15px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; border: 1px solid #333; }
        .word-tag { background: rgba(0, 242, 255, 0.1); border: 1px solid var(--neon); color: var(--neon); padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; animation: pop 0.3s ease; }
        @keyframes pop { from {transform: scale(0);} to {transform: scale(1);} }

        .results { display: none; margin-top: 20px; background: #111; padding: 20px; border-radius: 20px; border: 1px solid var(--neon); }
    </style>
</head>
<body>

<div class="container">
    <div class="brain-box">
        <svg class="brain-svg" viewBox="0 0 24 24"><path d="M12,3C7.58,3 4,4.79 4,7C4,9.21 7.58,11 12,11C16.42,11 20,9.21 20,7C20,4.79 16.42,3 12,3M4,9V12C4,14.21 7.58,16 12,16C16.42,16 20,14.21 20,12V9C18.16,10.22 15.2,11 12,11C8.8,11 5.84,10.22 4,9M4,14V17C4,19.21 7.58,21 12,21C16.42,21 20,19.21 20,17V14C18.16,15.22 15.2,16 12,16C8.8,16 5.84,15.22 4,14Z"/></svg>
    </div>
    <h1>NEURO-SCAN V3</h1>
    <p style="font-size: 0.7rem; color: #888;">Especializado en Neuropsicología Clínica</p>

    <select id="test">
        <optgroup label="Fonológica">
            <option value="Letra F">Fluidez Letra F</option>
            <option value="Letra A">Fluidez Letra A</option>
            <option value="Letra S">Fluidez Letra S</option>
        </optgroup>
        <optgroup label="Semántica">
            <option value="Animales">Categoría Animales</option>
            <option value="Frutas">Categoría Frutas</option>
            <option value="Profesiones">Categoría Profesiones</option>
        </optgroup>
    </select>

    <button id="micBtn" class="btn-mic" onclick="initVoice()">1. ACTIVAR MICRO (Móvil)</button>
    <button id="startBtn" class="btn-start" onclick="startTest()" disabled>2. INICIAR PRUEBA</button>

    <div id="timer" class="timer">60</div>
    <div class="words-container" id="wordBox"></div>

    <div id="results" class="results">
        <h2 style="color:var(--neon)">FIN DE PRUEBA</h2>
        <p>Total detectado: <span id="count" style="font-size: 2rem; font-weight: bold;">0</span></p>
        <button onclick="sendMail()" style="background: var(--neon); color: black;">ENVIAR A MI CORREO</button>
        <button onclick="location.reload()" style="background: transparent; color: white; border: 1px solid white;">REINTENTAR</button>
    </div>
</div>

<script>
    let recognition;
    let timer;
    let seconds = 60;
    let words = new Set();
    const myEmail = "stiven.brayan1@gmail.com";

    // Función crítica para que el móvil reconozca voz
    function initVoice() {
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!Speech) {
            alert("Tu móvil no soporta esta tecnología. Usa Chrome en Android o Safari en iPhone.");
            return;
        }

        recognition = new Speech();
        recognition.lang = 'es-EC';
        recognition.continuous = true;
        recognition.interimResults = true; // Para captar palabras rápido en móvil

        recognition.onresult = (event) => {
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    let text = event.results[i][0].transcript.toLowerCase().trim();
                    let splitWords = text.split(/\s+/);
                    splitWords.forEach(w => {
                        if (w.length > 1 && !words.has(w)) {
                            words.add(w);
                            addTag(w);
                        }
                    });
                }
            }
        };

        // Pedir permiso de micro
        navigator.mediaDevices.getUserMedia({ audio: true }).then(() => {
            document.getElementById('micBtn').innerHTML = "✓ MICRO LISTO";
            document.getElementById('micBtn').style.borderColor = "var(--success)";
            const sBtn = document.getElementById('startBtn');
            sBtn.disabled = false;
            sBtn.classList.add('btn-active');
        }).catch(() => alert("Debes permitir el micrófono para que funcione."));
    }

    function startTest() {
        words.clear();
        document.getElementById('wordBox').innerHTML = "";
        document.getElementById('startBtn').disabled = true;
        
        recognition.start();

        timer = setInterval(() => {
            seconds--;
            document.getElementById('timer').innerText = seconds;
            if (seconds <= 0) {
                clearInterval(timer);
                recognition.stop();
                showResults();
            }
        }, 1000);
    }

    function addTag(w) {
        const span = document.createElement('span');
        span.className = 'word-tag';
        span.innerText = w;
        document.getElementById('wordBox').appendChild(span);
    }

    function showResults() {
        document.getElementById('results').style.display = 'block';
        document.getElementById('count').innerText = words.size;
    }

    function sendMail() {
        const testName = document.getElementById('test').value;
        const wordList = Array.from(words).join(', ');
        const total = words.size;
        
        // Link de correo compatible con Gmail App y Mail de iPhone
        const subject = `Resultado de Evaluación: ${testName}`;
        const body = `Hola Steven,\n\nSe ha completado una evaluación de fluidez verbal.\n\nPrueba: ${testName}\nTotal Palabras: ${total}\nLista: ${wordList}\n\nEnviado desde NeuroScan V3.`;
        
        const mailtoUrl = `mailto:${myEmail}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
        
        // Abrir correo
        window.location.href = mailtoUrl;
    }
</script>
</body>
</html>
